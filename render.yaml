databases:
  - name: respondIA-db
    plan: free
    databaseName: respondia
    user: respondia

services:
  - type: web
    name: respondIA-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: respondIA-db
          property: connectionString
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: ADMIN_KEY
        sync: false
      - key: WEBHOOK_BASE_URL
        value: https://respondia.onrender.com
